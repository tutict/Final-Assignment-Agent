services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  redpanda:
    image: redpandadata/redpanda:v24.1.2
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --brokers=127.0.0.1:9092 >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 20s

  elasticsearch:
    build:
      context: ./backend/docker/elasticsearch
      args:
        ES_VERSION: "9.2.6"
    image: final-assignment-elasticsearch:9.2.6
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9200'"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 45s

  backend:
    build:
      context: ./backend
    image: final-assignment-backend:latest
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SERVER_PORT: ${SERVER_PORT}
      NETWORK_SERVER_PORT: ${NETWORK_SERVER_PORT}
      APP_VERSION: ${APP_VERSION}
      APP_DB_URL: ${APP_DB_URL}
      APP_DB_USERNAME: ${APP_DB_USERNAME}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
      APP_REDIS_HOST: ${APP_REDIS_HOST}
      APP_REDIS_PORT: ${APP_REDIS_PORT}
      APP_REDIS_DATABASE: ${APP_REDIS_DATABASE}
      APP_REDIS_TIMEOUT: ${APP_REDIS_TIMEOUT}
      APP_KAFKA_BOOTSTRAP_SERVERS: ${APP_KAFKA_BOOTSTRAP_SERVERS}
      SPRING_ELASTICSEARCH_URIS: ${SPRING_ELASTICSEARCH_URIS}
      SPRING_DATA_ELASTICSEARCH_REPOSITORIES_ENABLED: ${SPRING_DATA_ELASTICSEARCH_REPOSITORIES_ENABLED}
      APP_ELASTICSEARCH_SYNC_ON_STARTUP: ${APP_ELASTICSEARCH_SYNC_ON_STARTUP}
      APP_ELASTICSEARCH_SYNC_BATCH_SIZE: ${APP_ELASTICSEARCH_SYNC_BATCH_SIZE}
      MANAGEMENT_HEALTH_ELASTICSEARCH_ENABLED: ${MANAGEMENT_HEALTH_ELASTICSEARCH_ENABLED}
      APP_JWT_SECRET_KEY: ${APP_JWT_SECRET_KEY}
      APP_BOOTSTRAP_ADMIN_ENABLED: ${APP_BOOTSTRAP_ADMIN_ENABLED}
      APP_BOOTSTRAP_ADMIN_USERNAME: ${APP_BOOTSTRAP_ADMIN_USERNAME}
      APP_BOOTSTRAP_ADMIN_PASSWORD: ${APP_BOOTSTRAP_ADMIN_PASSWORD}
      APP_BACKEND_URL: ${APP_BACKEND_URL}
      APP_BACKEND_PORT: ${APP_BACKEND_PORT}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      APP_RUNTIME_BOOTSTRAP_CONTAINERS: ${APP_RUNTIME_BOOTSTRAP_CONTAINERS}
      JAVA_OPTS: ${JAVA_OPTS}
    ports:
      - "${SERVER_PORT}:8080"
      - "${NETWORK_SERVER_PORT}:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 45s

volumes:
  mysql_data:
  redis_data:
  redpanda_data:
  elasticsearch_data:
