services:
  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APP_GATEWAY_HTTP_PORT:-80}:80"
      - "${APP_GATEWAY_HTTPS_PORT:-443}:443"
    volumes:
      - ./ops/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ops/nginx/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 10s
