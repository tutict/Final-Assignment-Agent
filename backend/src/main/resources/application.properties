spring.application.name=final-assignment-agent-backend
server.port=${SERVER_PORT:8080}
network.server.port=${NETWORK_SERVER_PORT:8081}
spring.main.allow-circular-references=true
spring.threads.virtual.enabled=true
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics,prometheus}
management.health.elasticsearch.enabled=${MANAGEMENT_HEALTH_ELASTICSEARCH_ENABLED:false}
info.app.name=Final Assignment Agent
info.app.description=Traffic violation management backend
info.app.version=${APP_VERSION:dev}

# MyBatis Plus
spring.datasource.url=${APP_DB_URL:jdbc:mysql://localhost:3306/traffic?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8}
spring.datasource.username=${APP_DB_USERNAME:root}
spring.datasource.password=${APP_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.type-aliases-package=com.tutict.finalassignmentbackend.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.logic-delete-field=deletedAt
mybatis-plus.global-config.db-config.logic-delete-value=null
mybatis-plus.global-config.db-config.logic-not-delete-value="now()"

# Logging
logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.com.tutict.finalassignmentbackend=INFO
debug=false

# Kafka settings
spring.kafka.bootstrap-servers=${APP_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=my-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.acks=1
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# JWT
jwt.secret.key=${APP_JWT_SECRET_KEY:}

# Redis settings
spring.data.redis.host=${APP_REDIS_HOST:localhost}
spring.data.redis.port=${APP_REDIS_PORT:6379}
spring.data.redis.database=${APP_REDIS_DATABASE:0}
spring.data.redis.timeout=${APP_REDIS_TIMEOUT:10s}

# ElasticSearch settings
spring.data.elasticsearch.repositories.enabled=${SPRING_DATA_ELASTICSEARCH_REPOSITORIES_ENABLED:false}
spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
app.elasticsearch.sync-on-startup=${APP_ELASTICSEARCH_SYNC_ON_STARTUP:false}
app.elasticsearch.sync-batch-size=${APP_ELASTICSEARCH_SYNC_BATCH_SIZE:500}
app.runtime.bootstrap-containers=${APP_RUNTIME_BOOTSTRAP_CONTAINERS:false}
app.docker.elasticsearch.enabled=${APP_DOCKER_ELASTICSEARCH_ENABLED:false}
app.docker.elasticsearch.image=${APP_DOCKER_ELASTICSEARCH_IMAGE:final-assignment-elasticsearch:9.2.6}
app.docker.elasticsearch.compatible-image=${APP_DOCKER_ELASTICSEARCH_COMPATIBLE_IMAGE:docker.elastic.co/elasticsearch/elasticsearch}

# Backend Service Configuration
backend.url=${APP_BACKEND_URL:http://127.0.0.1}
backend.port=${APP_BACKEND_PORT:${SERVER_PORT:8080}}
network.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080}

# Agent search skill
app.ai.search.enabled=${APP_AI_SEARCH_ENABLED:false}
app.ai.search.max-results=6
app.ai.chat.max-concurrent=16
app.ai.chat.skill-timeout-seconds=8

# Traffic news aggregation
app.news.rss.base-url=https://news.google.com/rss/search
app.news.rss.language-tag=zh-CN
app.news.rss.geo=CN
app.news.rss.ceid=CN:zh-Hans
app.news.rss.max-results=10
app.news.rss.query=traffic OR traffic police OR traffic violation OR drunk driving OR speeding OR accident OR highway
app.news.rss.days-back=7
app.news.rss.timeout-seconds=5

# Bootstrap admin account
app.bootstrap.admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap.admin.username=${APP_BOOTSTRAP_ADMIN_USERNAME:admin}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}

# Product governance
app.product.edition-mode=${APP_PRODUCT_EDITION_MODE:GOV}
app.product.tenant-isolation-enabled=${APP_PRODUCT_TENANT_ISOLATION_ENABLED:true}
app.product.cross-organization-access-enabled=${APP_PRODUCT_CROSS_ORGANIZATION_ACCESS_ENABLED:false}
app.product.ai.enabled=${APP_PRODUCT_AI_ENABLED:false}
app.product.ai.advisory-only=${APP_PRODUCT_AI_ADVISORY_ONLY:true}
app.product.ai.traceable-output=${APP_PRODUCT_AI_TRACEABLE_OUTPUT:true}
app.product.ai.display-sources=${APP_PRODUCT_AI_DISPLAY_SOURCES:true}
app.product.ai.redact-sensitive-data=${APP_PRODUCT_AI_REDACT_SENSITIVE_DATA:true}
app.product.ai.auditable-configuration=${APP_PRODUCT_AI_AUDITABLE_CONFIGURATION:true}
app.product.ai.tenant-can-disable=${APP_PRODUCT_AI_TENANT_CAN_DISABLE:true}
app.product.seed.standard-enabled=${APP_PRODUCT_SEED_STANDARD_ENABLED:true}
app.operations.backup-directory=${APP_OPERATIONS_BACKUP_DIRECTORY:./backups}
app.operations.backup-retention-days=${APP_OPERATIONS_BACKUP_RETENTION_DAYS:30}
app.tenant.tenant-id-header=${APP_TENANT_TENANT_ID_HEADER:X-Tenant-Id}
app.tenant.organization-code-header=${APP_TENANT_ORGANIZATION_CODE_HEADER:X-Organization-Code}
app.tenant.region-code-header=${APP_TENANT_REGION_CODE_HEADER:X-Region-Code}
app.tenant.department-code-header=${APP_TENANT_DEPARTMENT_CODE_HEADER:X-Department-Code}
app.tenant.platform-tenant-id=${APP_TENANT_PLATFORM_TENANT_ID:platform}

# Delivery foundation
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
