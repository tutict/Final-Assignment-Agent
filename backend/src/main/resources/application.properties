spring.application.name=final-assignment-agent-backend
server.port=8080
spring.main.allow-circular-references=true
spring.threads.virtual.enabled=true
management.endpoints.web.exposure.include=health,info,metrics,prometheus

# MyBatis Plus
spring.datasource.url=jdbc:mysql://localhost:3306/traffic
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.type-aliases-package=com.tutict.finalassignmentbackend.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.logic-delete-field=deletedAt
mybatis-plus.global-config.db-config.logic-delete-value=null
mybatis-plus.global-config.db-config.logic-not-delete-value="now()"

# Logging
logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.com.tutict.finalassignmentbackend=INFO
debug=false

# Kafka settings
spring.kafka.bootstrap-servers=${APP_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=my-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.acks=1
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# JWT
jwt.secret.key=enF+H76/wFSw7Pa8/TQ4RkPeLJgy4GOtkcD/aA9Q65M=

# Redis settings
spring.data.redis.host=${APP_REDIS_HOST:localhost}
spring.data.redis.port=${APP_REDIS_PORT:6379}

# ElasticSearch settings
spring.data.elasticsearch.repositories.enabled=true

# Backend Service Configuration
backend.url=http://localhost
backend.port=8080

# Agent search skill
app.ai.search.enabled=true
app.ai.search.max-results=6
