spring.application.name=final-assignment-agent-backend
server.port=8080
spring.main.allow-circular-references=true
spring.threads.virtual.enabled=true
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.health.elasticsearch.enabled=${MANAGEMENT_HEALTH_ELASTICSEARCH_ENABLED:false}

# MyBatis Plus
spring.datasource.url=jdbc:mysql://localhost:3306/traffic
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.type-aliases-package=com.tutict.finalassignmentbackend.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.logic-delete-field=deletedAt
mybatis-plus.global-config.db-config.logic-delete-value=null
mybatis-plus.global-config.db-config.logic-not-delete-value="now()"

# Logging
logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.com.tutict.finalassignmentbackend=INFO
debug=false

# Kafka settings
spring.kafka.bootstrap-servers=${APP_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=my-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.acks=1
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# JWT
jwt.secret.key=enF+H76/wFSw7Pa8/TQ4RkPeLJgy4GOtkcD/aA9Q65M=

# Redis settings
spring.data.redis.host=${APP_REDIS_HOST:localhost}
spring.data.redis.port=${APP_REDIS_PORT:6379}

# ElasticSearch settings
spring.data.elasticsearch.repositories.enabled=${SPRING_DATA_ELASTICSEARCH_REPOSITORIES_ENABLED:false}
spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
app.elasticsearch.sync-on-startup=${APP_ELASTICSEARCH_SYNC_ON_STARTUP:false}
app.docker.elasticsearch.enabled=${APP_DOCKER_ELASTICSEARCH_ENABLED:false}
app.docker.elasticsearch.image=${APP_DOCKER_ELASTICSEARCH_IMAGE:tutict/elasticsearch-with-plugins:9.2.6-for-my-work}
app.docker.elasticsearch.compatible-image=${APP_DOCKER_ELASTICSEARCH_COMPATIBLE_IMAGE:docker.elastic.co/elasticsearch/elasticsearch}

# Backend Service Configuration
backend.url=http://localhost
backend.port=8080

# Agent search skill
app.ai.search.enabled=${APP_AI_SEARCH_ENABLED:false}
app.ai.search.max-results=6

# Traffic news aggregation
app.news.rss.base-url=https://news.google.com/rss/search
app.news.rss.language-tag=zh-CN
app.news.rss.geo=CN
app.news.rss.ceid=CN:zh-Hans
app.news.rss.max-results=10
app.news.rss.query=traffic OR traffic police OR traffic violation OR drunk driving OR speeding OR accident OR highway
app.news.rss.days-back=7
app.news.rss.timeout-seconds=5

# Bootstrap admin account
app.bootstrap.admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap.admin.username=${APP_BOOTSTRAP_ADMIN_USERNAME:admin}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}
