server.shutdown=graceful
server.forward-headers-strategy=framework
server.compression.enabled=true
server.compression.min-response-size=2KB
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,text/javascript,application/javascript
spring.lifecycle.timeout-per-shutdown-phase=20s

management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.health.elasticsearch.enabled=${MANAGEMENT_HEALTH_ELASTICSEARCH_ENABLED:true}
management.metrics.tags.application=${spring.application.name}

spring.data.elasticsearch.repositories.enabled=${SPRING_DATA_ELASTICSEARCH_REPOSITORIES_ENABLED:true}
app.runtime.bootstrap-containers=false
app.docker.elasticsearch.enabled=false
network.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:}
