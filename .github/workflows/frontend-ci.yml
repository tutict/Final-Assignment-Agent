name: frontend-ci

on:
  push:
    paths:
      - "flutter_app/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "flutter_app/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  flutter-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

      - name: Widget regression tests
        env:
          HTTP_PROXY: ""
          HTTPS_PROXY: ""
          NO_PROXY: "127.0.0.1,localhost"
          http_proxy: ""
          https_proxy: ""
          no_proxy: "127.0.0.1,localhost"
        run: flutter test --no-pub test/responsive_viewport_test.dart
